name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-mock mongomock

      - name: Set test environment variables
        run: |
          echo "JWT_SECRET=${JWT_SECRET:-test-secret-key-for-ci}" >> $GITHUB_ENV
          echo "MONGO_URI=${MONGO_URI:-mongodb://localhost:27017/testdb}" >> $GITHUB_ENV
          echo "REDIS_HOST=${REDIS_HOST:-localhost}" >> $GITHUB_ENV
          echo "REDIS_PORT=6379" >> $GITHUB_ENV
          echo "SECRET_KEY=${SECRET_KEY:-test-secret-key}" >> $GITHUB_ENV
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          MONGO_URI: ${{ secrets.MONGO_URI }}
          REDIS_HOST: ${{ secrets.REDIS_HOST }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}

      - name: Lint with flake8
        run: |
          pip install flake8
          # Stop the build if there are Python syntax errors or undefined names
          flake8 app --count --select=E9,F63,F7,F82 --show-source --statistics
          # Exit-zero treats all errors as warnings
          flake8 app --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        continue-on-error: true

      - name: Format check with black
        run: |
          pip install black
          black --check app tests
        continue-on-error: true

      - name: Run tests
        run: |
          pytest --cov=app --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
        continue-on-error: true

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  docker-build:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -t website-extractor:latest .
          docker images

      - name: Test Docker image
        run: |
          docker run -d -p 5000:5000 \
            -e JWT_SECRET=test-secret \
            -e MONGO_URI=mongodb://localhost:27017/testdb \
            -e REDIS_HOST=localhost \
            -e REDIS_PORT=6379 \
            -e SECRET_KEY=test-secret \
            --name test-container \
            website-extractor:latest || true
          sleep 5
          docker ps -a
          docker logs test-container || true
